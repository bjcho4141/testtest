# ════════════════════════════════════════════════════════════════
# Supabase Project Configuration — utube-shorts-jp
# ════════════════════════════════════════════════════════════════
#
# Linked project ref: wbcgkevlinenkxpogfdf
# 적용:
#   npx supabase login
#   npx supabase link --project-ref wbcgkevlinenkxpogfdf
#   npx supabase db push
# ════════════════════════════════════════════════════════════════

project_id = "wbcgkevlinenkxpogfdf"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "500MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# 카카오 OAuth (대표님이 Supabase 대시보드에서 활성화 + Client ID/Secret 등록)
[auth.external.kakao]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_KAKAO_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_KAKAO_SECRET)"
redirect_uri = ""
url = ""

[edge_runtime]
enabled = true
policy = "oneshot"

[analytics]
enabled = false
